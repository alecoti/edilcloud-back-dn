<!DOCTYPE html>
<html lang="it">
  <body style="margin:0;padding:24px;background:#f4f4f5;font-family:Inter,Arial,sans-serif;color:#18181b;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" style="max-width:600px;background:#ffffff;border:1px solid #e4e4e7;border-radius:16px;overflow:hidden;">
            <tr>
              <td style="padding:32px 40px;border-bottom:1px solid #f4f4f5;text-align:center;">
                <div style="font-size:24px;font-weight:600;letter-spacing:-0.5px;">EdilCloud</div>
              </td>
            </tr>
            <tr>
              <td style="padding:40px;">
                <h1 style="margin:0 0 16px;font-size:20px;">Reimposta la tua password</h1>
                <p style="margin:0 0 24px;font-size:15px;line-height:1.6;color:#52525b;">
                  Hai richiesto di aggiornare la password del tuo account EdilCloud.
                </p>
                <div style="margin:0 0 24px;padding:20px;border-radius:12px;background:#18181b;color:#ffffff;text-align:center;font-size:32px;font-weight:700;letter-spacing:8px;">
                  {{ code }}
                </div>
                <p style="margin:0 0 12px;font-size:15px;line-height:1.6;color:#52525b;">
                  Il codice resta valido per {{ ttl_minutes }} minuti.
                </p>
                <p style="margin:0;font-size:14px;line-height:1.6;color:#71717a;">
                  Se non hai richiesto tu questa operazione, puoi ignorare questa email oppure contattare
                  <a href="mailto:{{ support_email }}" style="color:#d97706;text-decoration:none;">{{ support_email }}</a>.
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
