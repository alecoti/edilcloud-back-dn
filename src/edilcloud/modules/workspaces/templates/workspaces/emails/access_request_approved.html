<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accesso approvato</title>
  <style>
    body { margin: 0; padding: 0; background: #f4f4f5; font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: #18181b; }
    .wrapper { width: 100%; padding: 32px 12px; }
    .container { max-width: 620px; margin: 0 auto; background: #fff; border: 1px solid #e4e4e7; border-radius: 16px; overflow: hidden; }
    .header, .content, .footer { padding: 28px 32px; }
    .header { border-bottom: 1px solid #f4f4f5; text-align: center; }
    .brand { font-size: 24px; font-weight: 700; }
    .title { margin: 0 0 14px; font-size: 24px; font-weight: 700; }
    .text { margin: 0 0 18px; font-size: 15px; line-height: 1.65; color: #52525b; }
    .cta { display: inline-block; margin-top: 8px; padding: 13px 18px; border-radius: 10px; background: #18181b; color: #fff !important; text-decoration: none; font-weight: 600; }
    .footer { border-top: 1px solid #f4f4f5; background: #fafafa; }
    .footer p { margin: 0; font-size: 12px; color: #71717a; line-height: 1.7; }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="container">
      <div class="header">
        <div class="brand">EdilCloud</div>
      </div>
      <div class="content">
        <h1 class="title">Accesso approvato</h1>
        <p class="text">
          La tua richiesta di accesso a <strong>{{ workspace_name }}</strong> e stata approvata.
        </p>
        <p class="text">Profilo associato: <strong>{{ member_name }}</strong></p>
        <a class="cta" href="{{ login_url }}">Accedi a EdilCloud</a>
      </div>
      <div class="footer">
        <p>Per supporto: <a href="mailto:{{ support_email }}">{{ support_email }}</a></p>
      </div>
    </div>
  </div>
</body>
</html>
