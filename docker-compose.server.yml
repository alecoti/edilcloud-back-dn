services:
  db:
    image: pgvector/pgvector:pg18
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./.runtime/postgres:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ./.runtime/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 20

  wordpress-db:
    image: mariadb:11.4
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${WORDPRESS_DB_NAME}
      MARIADB_USER: ${WORDPRESS_DB_USER}
      MARIADB_PASSWORD: ${WORDPRESS_DB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${WORDPRESS_DB_ROOT_PASSWORD}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --bind-address=0.0.0.0
    volumes:
      - ./.runtime/mariadb:/var/lib/mysql
    ports:
      - "${WORDPRESS_DB_BIND_IP}:${WORDPRESS_DB_PORT}:3306"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mariadb-admin ping -h 127.0.0.1 -u${WORDPRESS_DB_USER} -p${WORDPRESS_DB_PASSWORD}",
        ]
      interval: 10s
      timeout: 5s
      retries: 20

  web:
    build:
      context: .
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      APP_ENV: production
      DJANGO_SETTINGS_MODULE: edilcloud.settings.prod
      DEBUG: "false"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${BACKEND_BIND_IP}:${BACKEND_PORT}:8001"
    volumes:
      - ./media:/app/media
      - ./staticfiles:/app/staticfiles
    command:
      - sh
      - -c
      - |
        python scripts/wait_for_services.py db:5432 redis:6379 &&
        python manage.py migrate &&
        python manage.py collectstatic --noinput &&
        exec gunicorn edilcloud.asgi:application -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8001 --workers ${GUNICORN_WORKERS:-4} --timeout 120
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; req=urllib.request.Request('http://127.0.0.1:8001/api/v1/health', headers={'Host':'localhost','X-Forwarded-Proto':'https'}); urllib.request.urlopen(req, timeout=3).read()\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  assistant-worker:
    build:
      context: .
    restart: on-failure
    env_file:
      - .env.production
    environment:
      APP_ENV: production
      DJANGO_SETTINGS_MODULE: edilcloud.settings.prod
      DEBUG: "false"
    depends_on:
      web:
        condition: service_healthy
    volumes:
      - ./media:/app/media
      - ./staticfiles:/app/staticfiles
    command:
      - sh
      - -c
      - |
        python scripts/wait_for_services.py db:5432 redis:6379 &&
        exec python manage.py run_assistant_indexer --sleep-seconds ${ASSISTANT_INDEXER_POLL_SECONDS:-10} --batch-size ${ASSISTANT_INDEXER_BATCH_SIZE:-4}
