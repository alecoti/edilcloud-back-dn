name: Backend CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop
      - "feature/**"

permissions:
  contents: read

concurrency:
  group: backend-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONUNBUFFERED: "1"

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          for attempt in 1 2 3; do
            python -m pip install --upgrade pip && python -m pip install -e ".[dev]" && break
            if [ "$attempt" -eq 3 ]; then
              echo "Dependency installation failed after ${attempt} attempts."
              exit 1
            fi
            sleep $((attempt * 10))
          done

      - name: Compile operational scripts
        run: python -m py_compile scripts/*.py

      - name: Migration drift check
        run: python manage.py makemigrations --dry-run --check --settings=edilcloud.settings.test

      - name: Django system check
        run: python manage.py check --settings=edilcloud.settings.test

      - name: Backend test suite
        run: pytest -q
