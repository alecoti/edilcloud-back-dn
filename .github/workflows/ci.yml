name: Backend CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop
      - "feature/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Compile operational scripts
        run: python -m py_compile scripts/*.py

      - name: Migration drift check
        run: python manage.py makemigrations --dry-run --check --settings=edilcloud.settings.test

      - name: Django system check
        run: python manage.py check --settings=edilcloud.settings.test

      - name: Backend test suite
        run: pytest -q
