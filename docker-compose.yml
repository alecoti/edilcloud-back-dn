services:
  db:
    image: pgvector/pgvector:pg18
    environment:
      POSTGRES_DB: edilcloud_dn
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d edilcloud_dn"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  web:
    build:
      context: .
    env_file:
      - .env.local
    environment:
      APP_ENV: local
      DJANGO_SETTINGS_MODULE: edilcloud.settings.local
      DEBUG: "true"
      TIME_ZONE: Europe/Rome
      ALLOWED_HOSTS: localhost,127.0.0.1
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      CSRF_TRUSTED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/edilcloud_dn
      REDIS_URL: redis://redis:6379/0
      BACKEND_PUBLIC_URL: http://localhost:8001
      SUPERMEMORY_API_KEY: ""
      SUPERMEMORY_BASE_URL: ""
    ports:
      - "8001:8001"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./media:/app/media
      - ./staticfiles:/app/staticfiles
    command:
      - sh
      - -c
      - |
        python scripts/wait_for_services.py db:5432 redis:6379 &&
        python manage.py migrate &&
        python manage.py collectstatic --noinput &&
        exec gunicorn edilcloud.asgi:application -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8001 --workers 3 --timeout 120
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/api/v1/health', timeout=3).read()\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  assistant-worker:
    build:
      context: .
    env_file:
      - .env.local
    environment:
      APP_ENV: local
      DJANGO_SETTINGS_MODULE: edilcloud.settings.local
      DEBUG: "true"
      TIME_ZONE: Europe/Rome
      DATABASE_URL: postgresql://postgres:postgres@db:5432/edilcloud_dn
      REDIS_URL: redis://redis:6379/0
      BACKEND_PUBLIC_URL: http://localhost:8001
      SUPERMEMORY_API_KEY: ""
      SUPERMEMORY_BASE_URL: ""
    depends_on:
      web:
        condition: service_healthy
    volumes:
      - ./media:/app/media
      - ./staticfiles:/app/staticfiles
    command:
      - sh
      - -c
      - |
        python scripts/wait_for_services.py db:5432 redis:6379 &&
        exec python manage.py run_assistant_indexer --sleep-seconds 10 --batch-size 4

volumes:
  postgres_data:
  redis_data:
